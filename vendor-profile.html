<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vendors Hub | Vendor Profile</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="manager-dashboard.html">
      <span class="brand-mark">VH</span>
      <span>The Vendors Hub</span>
    </a>
    <nav class="header-actions" aria-label="Vendor profile navigation">
      <a class="header-link" href="manager-dashboard.html">All markets</a>
      <button id="logoutButton" class="ghost-button" type="button">Log out</button>
    </nav>
  </header>

  <main class="page-shell">
    <a id="backButton" class="back-link" href="manager-dashboard.html">← Back</a>
    <div id="vendorProfile" class="profile-stack"></div>

    <section class="content-card reviews-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Property Manager only</p>
          <h2>Recent reviews</h2>
          <p>Reviews are visible from the Property Manager side of the platform.</p>
        </div>
      </div>

      <form id="reviewForm" class="review-form soft-panel">
        <label>
          Rating
          <select name="rating" required>
            <option value="">Select rating</option>
            <option value="5">5 stars</option>
            <option value="4">4 stars</option>
            <option value="3">3 stars</option>
            <option value="2">2 stars</option>
            <option value="1">1 star</option>
          </select>
        </label>
        <label>
          Review title
          <input type="text" name="title" placeholder="Example: Fast response time">
        </label>
        <label class="span-two">
          Review comment
          <textarea name="comment" rows="4" placeholder="Share a short note about your experience with this vendor." required></textarea>
        </label>
        <button class="secondary-button" type="submit">Add review</button>
        <p id="reviewMessage" class="form-message" aria-live="polite"></p>
      </form>

      <div id="reviewsList" class="reviews-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>The Vendors Hub · Vendor profile</p>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/vendor-profile.js"></script>
</body>
</html>
