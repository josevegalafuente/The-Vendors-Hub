<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vendors Hub | Property Manager Markets</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="manager-dashboard.html">
      <span class="brand-mark">VH</span>
      <span>The Vendors Hub</span>
    </a>
    <nav class="header-actions" aria-label="Property manager navigation">
      <a class="header-link" href="manager-dashboard.html">All markets</a>
      <button id="logoutButton" class="ghost-button" type="button">Log out</button>
    </nav>
  </header>

  <main class="page-shell">
    <section class="page-hero markets-hero">
      <div>
        <p class="eyebrow">Property Manager dashboard</p>
        <h1>National markets</h1>
        <p>Select a state market, then browse vendor categories and registered profiles.</p>
      </div>
      <div class="hero-stat-row compact-stats">
        <article>
          <strong id="totalMarkets">50</strong>
          <span>Markets</span>
        </article>
        <article>
          <strong id="totalVendors">0</strong>
          <span>Registered vendors</span>
        </article>
      </div>
    </section>

    <section class="content-card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Browse markets</p>
          <h2>Choose a U.S. state</h2>
        </div>
        <label class="search-field">
          <span>Search markets</span>
          <input id="marketSearch" type="search" placeholder="Search by state or code">
        </label>
      </div>
      <div id="marketsGrid" class="markets-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>The Vendors Hub · Property Manager markets</p>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/manager-dashboard.js"></script>
</body>
</html>
